name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
        suite: [api, web]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy core/ apis/ pages/ fixtures/ --ignore-missing-imports

      - name: Run tests
        run: pytest tests/${{ matrix.suite }}/ -n auto --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-${{ matrix.suite }}-py${{ matrix.python }}
          path: allure-results
